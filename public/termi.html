<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHS Terminal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    .terminal {
      width: 900px;
      height: 600px;
      background: rgba(10, 10, 20, 0.95);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
                  inset 0 0 80px rgba(0, 255, 100, 0.05);
      overflow: hidden;
      border: 1px solid #1a1a2e;
    }

    .terminal-header {
      background: linear-gradient(to right, #1a1a2e, #16213e);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #0f3460;
    }

    .terminal-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .terminal-title {
      color: #a0a0cc;
      font-size: 14px;
      margin-left: 15px;
      opacity: 0.8;
    }

    .terminal-body {
      padding: 20px;
      height: calc(100% - 50px);
      color: #00ff9d;
      font-size: 15.5px;
      line-height: 1.6;
      overflow-y: auto;
      background: repeating-linear-gradient(
        transparent 0px,
        transparent 24px,
        rgba(0, 255, 100, 0.03) 24px,
        rgba(0, 255, 100, 0.03) 25px
      );
    }

    .output {
      margin-bottom: 12px;
    }

    .prompt-line {
      display: flex;
      margin-bottom: 8px;
    }

    .prompt {
      color: #00ccff;
      white-space: nowrap;
      margin-right: 10px;
    }

    .prompt-user {
      color: #ff79c6;
    }

    .prompt-host {
      color: #50fa7b;
    }

    .prompt-path {
      color: #f1fa8c;
    }

    .prompt-symbol {
      color: #ff5555;
      font-weight: bold;
    }

    input {
      background: transparent;
      border: none;
      outline: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: inherit;
      flex: 1;
      caret-color: #00ff9d;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 18px;
      background: #00ff9d;
      animation: blink 0.8s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .welcome {
      color: #6272a4;
      margin-bottom: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="terminal">
    <!-- Header -->
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="terminal-title">ghs@linux — Terminal</div>
    </div>

    <!-- Body -->
    <div class="terminal-body" id="terminal">
      <div class="welcome">
        Welcome to <span style="color:#50fa7b;">GHS Terminal</span><br>
        Type <span style="color:#ff79c6;">help</span> for available commands.
      </div>

      <!-- Initial prompt will be added by JS -->
    </div>
  </div>

  <script>
    const terminal = document.getElementById('terminal');
    let commandHistory = [];
    let historyIndex = -1;

    function createPrompt() {
      const promptLine = document.createElement('div');
      promptLine.className = 'prompt-line';

      promptLine.innerHTML = `
        <span class="prompt">
          <span class="prompt-host">localhost</span>:<span class="prompt-user">ghs</span>--<span class="prompt-symbol">#</span>
        </span>
        <input type="text" autofocus spellcheck="false" autocomplete="off">
      `;

      const input = promptLine.querySelector('input');

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          const command = input.value.trim();
          
          if (command) {
            commandHistory.unshift(command);
            historyIndex = -1;
            
            // Display command
            const commandOutput = document.createElement('div');
            commandOutput.innerHTML = `
              <span class="prompt">
                <span class="prompt-host">localhost</span>:<span class="prompt-user">ghs</span>--<span class="prompt-symbol">#</span>
              </span>
              <span style="color:#ffffff;">${command}</span>
            `;
            terminal.appendChild(commandOutput);

            // Process command
            processCommand(command);
          }

          // Create new prompt
          input.disabled = true;
          createPrompt();
        } 
        else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (commandHistory.length > 0) {
            historyIndex = Math.min(historyIndex + 1, commandHistory.length - 1);
            input.value = commandHistory[historyIndex];
          }
        } 
        else if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIndex > 0) {
            historyIndex--;
            input.value = commandHistory[historyIndex];
          } else {
            historyIndex = -1;
            input.value = '';
          }
        }
      });

      terminal.appendChild(promptLine);
      input.focus();

      // Scroll to bottom
      terminal.scrollTop = terminal.scrollHeight;
    }

    function processCommand(cmd) {
      const output = document.createElement('div');
      output.className = 'output';

      const lowerCmd = cmd.toLowerCase().trim();

      switch(lowerCmd) {
        case 'help':
          output.innerHTML = `
            Available commands:<br>
            • <span style="color:#50fa7b;">clear</span> - Clear terminal<br>
            • <span style="color:#50fa7b;">whoami</span> - Show current user<br>
            • <span style="color:#50fa7b;">date</span> - Show current date & time<br>
            • <span style="color:#50fa7b;">neofetch</span> - Show system info<br>
            • <span style="color:#50fa7b;">ls</span> - List files<br>
            • <span style="color:#50fa7b;">pwd</span> - Print working directory<br>
            • <span style="color:#50fa7b;">echo [text]</span> - Print text<br>
            • <span style="color:#ff79c6;">help</span> - Show this help
          `;
          break;

        case 'clear':
          terminal.innerHTML = `<div class="welcome">Terminal cleared.<br></div>`;
          createPrompt();
          return;

        case 'whoami':
          output.textContent = 'ghs';
          break;

        case 'date':
          output.textContent = new Date().toString();
          break;

        case 'pwd':
          output.textContent = '/home/ghs';
          break;

        case 'ls':
          output.innerHTML = `
            <span style="color:#8be9fd;">Desktop</span>  <span style="color:#8be9fd;">Documents</span>  <span style="color:#8be9fd;">Downloads</span><br>
            projects/  scripts/  <span style="color:#ff79c6;">.bashrc</span>  <span style="color:#ff79c6;">.zshrc</span>
          `;
          break;

        case 'neofetch':
          output.innerHTML = `
            <span style="color:#50fa7b;">       ███████╗ █████╗  ██████╗ ███████╗</span><br>
            <span style="color:#50fa7b;">       ██╔════╝██╔══██╗██╔════╝ ██╔════╝</span><br>
            <span style="color:#50fa7b;">       █████╗  ███████║██║  ███╗█████╗  </span><br>
            <span style="color:#50fa7b;">       ██╔══╝  ██╔══██║██║   ██║██╔══╝  </span><br>
            <span style="color:#50fa7b;">       ██║     ██║  ██║╚██████╔╝███████╗</span><br>
            <span style="color:#50fa7b;">       ╚═╝     ╚═╝  ╚═╝ ╚═════╝ ╚══════╝</span><br><br>
            <span style="color:#ff79c6;">OS:</span> Arch Linux x86_64<br>
            <span style="color:#ff79c6;">Host:</span> GHS Custom Terminal<br>
            <span style="color:#ff79c6;">Kernel:</span> 6.8.0-ghs<br>
            <span style="color:#ff79c6;">Uptime:</span> 42 mins<br>
            <span style="color:#ff79c6;">Shell:</span> ghs-terminal<br>
            <span style="color:#ff79c6;">User:</span> ghs
          `;
          break;

        default:
          if (lowerCmd.startsWith('echo ')) {
            output.textContent = cmd.substring(5);
          } else if (lowerCmd) {
            output.innerHTML = `zsh: command not found: <span style="color:#ff5555;">${cmd}</span>`;
          }
      }

      if (output.innerHTML !== '') {
        terminal.appendChild(output);
      }
    }

    // Initialize
    window.onload = () => {
      createPrompt();
    };
  </script>

</body>
</html>
