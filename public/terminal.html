<!doctype html>
<html>
    <head>
        <title>Web Shell</title>
        <style>
            body {
                background: #121212;
                color: #00ff00;
                font-family: "Courier New", monospace;
                padding: 20px;
            }
            #console {
                background: #000;
                border: 1px solid #444;
                height: 400px;
                padding: 10px;
                overflow-y: auto;
                white-space: pre-wrap;
                margin-bottom: 10px;
            }
            input {
                background: #000;
                color: #00ff00;
                border: 1px solid #444;
                padding: 10px;
                width: calc(100% - 22px);
                outline: none;
            }
        </style>
    </head>
    <body>
        <h3>Remote Server Console</h3>
        <div id="console"></div>
        <input
            type="text"
            id="input"
            placeholder="Type command and press Enter..."
            autofocus
        />

        <script src="js/socket.io.min.js"></script>
        <script>
            const socket = io("http://localhost:3000");
            const consoleDiv = document.getElementById("console");
            const inputField = document.getElementById("input");

            socket.on("terminal:output", data => {
                consoleDiv.textContent += data;
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            });

            inputField.addEventListener("keypress", e => {
                if (e.key === "Enter") {
                    const cmd = inputField.value;
                    // Sending the command with \n tells the bash shell to execute it
                    socket.emit("terminal:input", cmd + "\n");
                    inputField.value = "";
                }
            });

            socket.on(
                "connect",
                () => (consoleDiv.textContent += "CONNECTED TO SERVER...\n")
            );
        </script>
    </body>
</html>
