<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IDE Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --sidebar-bg: #252526;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --border: #3c3c3c;
            --accent: #007acc;
            --text-gray: #cccccc;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-dark); color: var(--text-gray);
            overflow: hidden;
        }

        /* Mobile Header */
        .header {
            height: 40px; background: #323233;
            display: flex; align-items: center; padding: 0 10px;
            border-bottom: 1px solid var(--border);
        }

        .menu-toggle {
            cursor: pointer; font-size: 20px;
            background: none; border: none; color: white;
            margin-right: 15px;
        }

        .container {
            display: flex; height: calc(100vh - 65px);
            position: relative;
        }

        /* Sidebar / Explorer */
        .sidebar {
            width: 250px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.3s ease; z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
        }

        .sidebar-title {
            padding: 10px 15px; font-size: 11px; font-weight: bold;
            color: #858585; display: flex; justify-content: space-between;
        }

        .file-item {
            padding: 4px 20px; cursor: pointer; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; color: white; }

        /* Main Content */
        .main-view { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Tabs Bar */
        .tabs-container {
            display: flex; background: #252526; height: 35px;
            overflow-x: auto; border-bottom: 1px solid var(--border);
        }

        .tab {
            min-width: 120px; padding: 0 10px; background: var(--tab-bg);
            border-right: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            font-size: 12px; cursor: pointer; user-select: none;
        }

        .tab.active {
            background: var(--tab-active); color: white;
            border-top: 1px solid var(--accent);
        }

        .tab-close {
            margin-left: 8px; font-size: 14px; width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center; border-radius: 3px;
        }

        .tab-close:hover { background: #454545; }

        /* Editor */
        #editor { flex-grow: 1; width: 100%; }

        /* Footer */
        .footer {
            height: 25px; background: var(--accent); color: white;
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 10px; font-size: 12px;
        }

        .btn-icon { cursor: pointer; color: #858585; border: none; background: none; }
        .btn-icon:hover { color: white; }
    </style>
</head>
<body>

    <header class="header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span style="font-size: 13px; font-weight: 500;">WebCode Editor</span>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">
                <span>EXPLORER</span>
                <button class="btn-icon" onclick="addNewFile()" title="New File">+</button>
            </div>
            <div id="fileList">
                </div>
        </aside>

        <main class="main-view">
            <div class="tabs-container" id="tabsContainer">
                </div>
            <div id="editor"></div>
        </main>
    </div>

    <footer class="footer">
        <div id="status">Ready</div>
        <div id="cursor">Ln 1, Col 1</div>
    </footer>

    <script>
        // Data Structure
        let files = {
            "index.html": "<!DOCTYPE html>\n<html>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>",
            "style.css": "body {\n  background: #1e1e1e;\n  color: white;\n}",
            "main.js": "console.log('App running...');"
        };
        
        let openTabs = ["index.html"]; // List of file names currently in tabs
        let activeFile = "index.html";

        // Initialize Ace
        const editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.setOptions({
            fontSize: "14px",
            showPrintMargin: false,
            enableBasicAutocompletion: true
        });

        // UI Logic
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function updateUI() {
            renderExplorer();
            renderTabs();
            
            // Set Editor Content
            const content = files[activeFile] || "";
            editor.setValue(content, -1);
            
            // Set Mode
            const ext = activeFile.split('.').pop();
            const modeMap = { html: "html", css: "css", js: "javascript" };
            editor.session.setMode(`ace/mode/${modeMap[ext] || "text"}`);
        }

        function renderExplorer() {
            const list = document.getElementById('fileList');
            list.innerHTML = "";
            Object.keys(files).forEach(name => {
                const div = document.createElement('div');
                div.className = `file-item ${name === activeFile ? 'active' : ''}`;
                div.innerHTML = `<span>${name}</span>`;
                div.onclick = () => openFile(name);
                list.appendChild(div);
            });
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = "";
            openTabs.forEach(name => {
                const tab = document.createElement('div');
                tab.className = `tab ${name === activeFile ? 'active' : ''}`;
                tab.innerHTML = `
                    <span onclick="switchActiveTab('${name}')">${name}</span>
                    <span class="tab-close" onclick="closeTab(event, '${name}')">×</span>
                `;
                container.appendChild(tab);
            });
        }

        function openFile(name) {
            if (!openTabs.includes(name)) {
                openTabs.push(name);
            }
            activeFile = name;
            updateUI();
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function switchActiveTab(name) {
            activeFile = name;
            updateUI();
        }

        function closeTab(event, name) {
            event.stopPropagation();
            openTabs = openTabs.filter(t => t !== name);
            if (activeFile === name) {
                activeFile = openTabs.length > 0 ? openTabs[openTabs.length - 1] : "";
            }
            updateUI();
        }

        function addNewFile() {
            const name = prompt("File name:");
            if (name && !files[name]) {
                files[name] = "";
                openFile(name);
            }
        }

        // Handle text changes
        editor.on("change", () => {
            if (activeFile) files[activeFile] = editor.getValue();
        });

        // Copy all feature
        function copyAll() {
            navigator.clipboard.writeText(editor.getValue());
            alert("Copied!");
        }

        // Initialize
        updateUI();

        // Status bar cursor update
        editor.selection.on('changeCursor', () => {
            const pos = editor.getCursorPosition();
            document.getElementById('cursor').innerText = `Ln ${pos.row + 1}, Col ${pos.column + 1}`;
        });
    </script>
</body>
</html>
